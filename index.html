<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Digital Scrapbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fffdf5; /* Off-white paper color */
            --cover-pink: #ffb6c1; 
            --spine-black: #1a1a1a;  
            --accent-pink: #ff69b4;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-image: url('Pictures/Desk Image1.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Indie Flower', cursive;
        }

        /* --- THE CAMERA SCENE --- */
        .scene {
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2500px;
            width: 100%; height: 100%;
            transform: scale(0.65); /* Starting zoom */
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .scene.zoomed { transform: scale(1.1); }

        /* --- THE REALISTIC BOOK --- */
        .book {
            width: 380px;
            height: 520px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            /* Realistic deep shadow on the desk */
            box-shadow: 
                5px 5px 20px rgba(0,0,0,0.2),
                30px 30px 50px rgba(0,0,0,0.3);
        }

        /* Added: Visual page thickness (the white stack on the side) */
        .book::before {
            content: '';
            position: absolute;
            top: 5px; right: -5px;
            width: 10px; height: 510px;
            background: #eee;
            border-radius: 2px;
            box-shadow: inset 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1;
        }

        .book.opened { transform: translateX(190px); }

        /* --- THE COVER (Interactive Part) --- */
        .cover-wrapper {
            width: 100%; height: 100%;
            position: absolute; z-index: 100; /* Higher Z-index to ensure it is clickable */
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        .book.opened .cover-wrapper { transform: rotateY(-180deg); }

        /* Front: Realistic Pink Cover */
        .cover-front {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--cover-pink) 0%, #ffc0cb 100%);
            border-radius: 0 15px 15px 0;
            position: absolute;
            backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-left: 20px solid var(--spine-black);
            box-sizing: border-box;
        }

        /* Added: Gold "foil" border on cover */
        .cover-front::after {
            content: '';
            position: absolute;
            top: 20px; left: 10px; right: 20px; bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            pointer-events: none;
        }

        /* Back: Left Page with Gutter Shadow */
        .cover-back {
            width: 100%; height: 100%;
            background-color: var(--paper);
            border-radius: 15px 0 0 15px;
            position: absolute;
            transform: rotateY(180deg); 
            backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; box-sizing: border-box;
            /* Inner shadow for the book fold */
            box-shadow: inset -20px 0 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* --- RIGHT PAGE (Memories) --- */
        .right-page {
            width: 100%; height: 100%;
            background-color: var(--paper);
            position: absolute; z-index: 5;
            border-radius: 0 15px 15px 0;
            padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            /* Inner shadow for the book fold */
            box-shadow: inset 20px 0 30px rgba(0,0,0,0.05);
        }

        .verse-text { font-family: 'Dancing Script'; font-size: 1.8rem; color: #444; line-height: 1.4; }
        .verse-ref { font-size: 1rem; color: var(--accent-pink); letter-spacing: 2px; font-weight: bold; margin-top: 15px; }

        #page-content { text-align: center; }

        .photo-frame {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: 10px auto;
            border: 1px solid #f0f0f0;
            width: 85%;
            transform: rotate(1deg); /* Slight tilt for realism */
        }

        .photo-frame img { width: 100%; height: 200px; object-fit: cover; display: block; }
        
        .nav-controls {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #eee; padding-top: 10px;
        }

        .btn {
            background: var(--spine-black); color: white;
            border: none; padding: 6px 15px;
            font-family: 'Indie Flower', cursive;
            cursor: pointer; border-radius: 4px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--accent-pink); }
        .btn:disabled { background: #eee; color: #ccc; cursor: not-allowed; }

        @media (max-width: 800px) {
            .scene { transform: scale(0.7) !important; }
            .book.opened { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="scene" id="scene">
    <!-- Click this whole book to toggle -->
    <div class="book" id="myBook">
        
        <div class="cover-wrapper" onclick="toggleBook()">
            <!-- Front -->
            <div class="cover-front">
                <h1 style="font-family: 'Dancing Script'; font-size: 3.2rem; margin:0;">Our Story</h1>
                <p style="margin: 5px 0; letter-spacing: 1px; opacity: 0.8;">TAP TO OPEN</p>
                <div style="font-size: 2.5rem; margin-top: 10px;">🎀</div>
            </div>

            <!-- Inside Left Page -->
            <div class="cover-back">
                <div class="verse-text">"When the time is right, I, the Lord, will make it happen."</div>
                <div class="verse-ref">ISAIAH 60:22</div>
                <div style="font-size: 2rem; margin-top: 20px;">🌸</div>
                <p style="font-size: 0.7rem; color: #bbb; margin-top: 40px;">(Tap to Close)</p>
            </div>
        </div>

        <!-- RIGHT PAGE -->
        <div class="right-page">
            <div id="page-content">
                <!-- Content loaded by JS -->
            </div>

            <div class="nav-controls">
                <button class="btn" id="prevBtn" onclick="prevPage(event)">← Back</button>
                <span style="font-size: 0.8rem; color:#ccc;" id="pageNum"></span>
                <button class="btn" id="nextBtn" onclick="nextPage(event)">Next →</button>
            </div>
        </div>
    </div>
</div>

<script>
    const myMemories = [
        {
            date: "The Beginning",
            image: "Pictures/Desk Image1.jpg", 
            text: "This is the first page of our digital scrapbook. I'm so excited to fill this with you."
        },
        {
            date: "A Little Note",
            image: "Pictures/Desk Image1.jpg", 
            text: "Every memory here is a treasure I want to keep forever."
        }
    ];

    let currentIndex = 0;
    const book = document.getElementById('myBook');
    const scene = document.getElementById('scene');

    // FIXED: Reliable toggle function
    function toggleBook() {
        if (book.classList.contains('opened')) {
            book.classList.remove('opened');
            scene.classList.remove('zoomed');
        } else {
            book.classList.add('opened');
            scene.classList.add('zoomed');
            updatePage();
        }
    }

    function updatePage() {
        const memory = myMemories[currentIndex];
        const content = document.getElementById('page-content');
        
        content.innerHTML = `
            <div style="color:var(--accent-pink); font-weight:bold; font-size:1.1rem; margin-bottom:5px;">${memory.date}</div>
            <div class="photo-frame">
                <img src="${memory.image}" alt="Memory">
            </div>
            <div style="font-size:1.2rem; line-height:1.4; color:#444; margin-top:10px;">${memory.text}</div>
        `;

        document.getElementById('pageNum').innerText = `Pg ${currentIndex + 1} / ${myMemories.length}`;
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === myMemories.length - 1);
    }

    function nextPage(e) {
        e.stopPropagation(); // Stops the click from reaching the cover and closing the book
        if (currentIndex < myMemories.length - 1) {
            currentIndex++;
            updatePage();
        }
    }

    function prevPage(e) {
        e.stopPropagation(); // Stops the click from reaching the cover and closing the book
        if (currentIndex > 0) {
            currentIndex--;
            updatePage();
        }
    }

    // Initial run
    updatePage();
</script>

</body>
</html>
